<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>markdown-web-viewer</title>
  <link id="theme-style" rel="stylesheet" href="styles/simple.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body {
      --bg: #ffffff;
      --text: #24292f;
      --border: #d0d7de;
      --editor-bg: #ffffff;
      --editor-text: #24292f;
      --menu-bg: rgba(36, 41, 47, 0.96);
      --menu-text: #e6edf3;
      --placeholder: #a0a8b2;
      --divider: #d0d7de;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }

    body.dark {
      --bg: #0d1117;
      --text: #e6edf3;
      --border: #30363d;
      --editor-bg: #161b22;
      --editor-text: #e6edf3;
      --menu-bg: rgba(22, 27, 34, 0.96);
      --menu-text: #e6edf3;
      --placeholder: #586069;
      --divider: #30363d;
    }

    /* ===== Menu Bar ===== */
    #menu-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 40px;
      background: var(--menu-bg);
      color: var(--menu-text);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      font-size: 13px;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #menu-bar::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      height: 24px;
    }

    #menu-bar.visible {
      transform: translateY(0);
    }

    .menu-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .menu-title a {
      display: flex;
      align-items: center;
      color: inherit;
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .menu-title a:hover {
      opacity: 1;
    }

    .menu-title svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .menu-spacer {
      flex: 1;
    }

    .menu-control {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .menu-control label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
    }

    .menu-control input[type="checkbox"] {
      cursor: pointer;
      accent-color: #58a6ff;
    }

    .menu-control select {
      background: rgba(255,255,255,0.1);
      color: inherit;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    .menu-control select:hover {
      background: rgba(255,255,255,0.15);
    }

    .menu-control select option {
      background: #24292f;
      color: #e6edf3;
    }

    #dark-toggle {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      color: inherit;
      cursor: pointer;
      padding: 2px 8px;
      font-size: 14px;
      line-height: 1;
      transition: background 0.2s;
    }

    #dark-toggle:hover {
      background: rgba(255,255,255,0.1);
    }

    .menu-separator {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }

    /* ===== Main Layout ===== */
    #main {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    #editor {
      width: 50%;
      height: 100%;
      resize: none;
      border: none;
      border-right: 1px solid var(--divider);
      padding: 24px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
      font-size: 14px;
      line-height: 1.6;
      background: var(--editor-bg);
      color: var(--editor-text);
      outline: none;
      overflow-y: auto;
      tab-size: 4;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    #editor::placeholder {
      color: var(--placeholder);
      font-style: italic;
    }

    #preview {
      width: 50%;
      height: 100%;
      padding: 24px 32px;
      overflow-y: auto;
      background: var(--bg);
      transition: background 0.3s ease;
    }

    .preview-placeholder {
      color: var(--placeholder);
      font-style: italic;
      font-size: 15px;
      padding-top: 4px;
    }

    /* ===== Mermaid ===== */
    .mermaid-container {
      margin: 16px 0;
      text-align: center;
      overflow-x: auto;
    }

    .mermaid-container svg {
      max-width: 100%;
      height: auto;
    }

    .mermaid-error {
      color: #cf222e;
      font-size: 0.85em;
    }

    body.dark .mermaid-error {
      color: #f85149;
    }

    /* ===== Fold State ===== */
    #main.folded #editor {
      display: none;
    }

    #main.folded #preview {
      width: 100%;
    }
  </style>
</head>
<body>
  <!-- Menu Bar -->
  <div id="menu-bar">
    <div class="menu-title">
      <span>markdown-web-viewer</span>
      <a href="https://github.com/okaponta/markdown-web-viewer" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>
        </svg>
      </a>
    </div>

    <div class="menu-spacer"></div>

    <div class="menu-control">
      <label>
        <select id="style-select">
          <option value="simple">Simple</option>
          <option value="kabukicho">Kabukicho</option>
        </select>
      </label>
    </div>

    <div class="menu-separator"></div>

    <div class="menu-control">
      <label>
        <input type="checkbox" id="fold-toggle">
        Fold
      </label>
    </div>

    <div class="menu-separator"></div>

    <div class="menu-control">
      <button id="dark-toggle" aria-label="Toggle dark mode"></button>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main">
    <textarea id="editor" placeholder="Paste your markdown here" spellcheck="false"></textarea>
    <div id="preview">
      <p class="preview-placeholder">Your rendered markdown will appear here</p>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const menuBar = document.getElementById('menu-bar');
      const editor = document.getElementById('editor');
      const preview = document.getElementById('preview');
      const foldToggle = document.getElementById('fold-toggle');
      const darkToggle = document.getElementById('dark-toggle');
      const styleSelect = document.getElementById('style-select');
      const themeLink = document.getElementById('theme-style');
      const main = document.getElementById('main');

      // --- Menu bar show/hide ---
      let menuVisible = false;
      let hideTimeout = null;

      function showMenu() {
        clearTimeout(hideTimeout);
        if (!menuVisible) {
          menuBar.classList.add('visible');
          menuVisible = true;
        }
      }

      function scheduleHide() {
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(function() {
          menuBar.classList.remove('visible');
          menuVisible = false;
        }, 300);
      }

      document.addEventListener('mousemove', function(e) {
        if (e.clientY < 30) {
          showMenu();
        }
      });

      menuBar.addEventListener('mouseenter', showMenu);
      menuBar.addEventListener('mouseleave', scheduleHide);

      // --- Fold toggle ---
      foldToggle.addEventListener('change', function() {
        if (foldToggle.checked) {
          main.classList.add('folded');
        } else {
          main.classList.remove('folded');
        }
      });

      // --- Dark mode ---
      var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      function applyDarkMode() {
        if (isDark) {
          document.body.classList.add('dark');
        } else {
          document.body.classList.remove('dark');
        }
        darkToggle.textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
      }

      applyDarkMode();

      darkToggle.addEventListener('click', function() {
        isDark = !isDark;
        applyDarkMode();
        updateMermaidTheme();
        render();
      });

      // --- Style switcher ---
      styleSelect.addEventListener('change', function() {
        themeLink.href = 'styles/' + styleSelect.value + '.css';
      });

      // --- Mermaid setup ---
      mermaid.initialize({
        startOnLoad: false,
        theme: isDark ? 'dark' : 'default',
        securityLevel: 'strict'
      });

      var mermaidCounter = 0;

      function updateMermaidTheme() {
        mermaid.initialize({
          startOnLoad: false,
          theme: isDark ? 'dark' : 'default',
          securityLevel: 'strict'
        });
      }

      // --- Markdown rendering ---
      marked.setOptions({
        breaks: true,
        gfm: true
      });

      function render() {
        var text = editor.value;
        if (!text.trim()) {
          preview.innerHTML = '<p class="preview-placeholder">Your rendered markdown will appear here</p>';
          return;
        }

        preview.innerHTML = marked.parse(text);

        // Find mermaid code blocks and render them
        var codeBlocks = preview.querySelectorAll('code.language-mermaid');
        var mermaidPromises = [];

        codeBlocks.forEach(function(codeEl) {
          var pre = codeEl.parentElement;
          var source = codeEl.textContent;
          var container = document.createElement('div');
          container.className = 'mermaid-container';
          var id = 'mermaid-' + (mermaidCounter++);

          pre.parentNode.replaceChild(container, pre);

          mermaidPromises.push(
            mermaid.render(id, source).then(function(result) {
              container.innerHTML = result.svg;
            }).catch(function() {
              container.innerHTML = '<pre class="mermaid-error"><code>' +
                source.replace(/</g, '&lt;').replace(/>/g, '&gt;') +
                '</code></pre>';
            })
          );
        });
      }

      editor.addEventListener('input', render);

      // --- Tab key support in editor ---
      editor.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
          e.preventDefault();
          var start = this.selectionStart;
          var end = this.selectionEnd;
          this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
          this.selectionStart = this.selectionEnd = start + 4;
          render();
        }
      });
    })();
  </script>
</body>
</html>
